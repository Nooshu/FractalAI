name: Renovate

on:
  schedule:
    - cron: '15 2 * * 1' # Mondays at 02:15 UTC
  workflow_dispatch:
  issues:
    types: [edited]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  security-events: read

jobs:
  renovate:
    if: >-
      github.event_name != 'issues' && github.event_name != 'issue_comment' ||
      startsWith(github.event.issue.title, 'Renovate Dependency Dashboard')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.13
        with:
          token: ${{ secrets.RENOVATE }}
        env:
          LOG_LEVEL: debug
          RENOVATE_FORCE: ${{ github.event_name == 'workflow_dispatch' && '{"schedule":[]}' || '' }}
          RENOVATE_REPOSITORIES: '["Nooshu/FractalAI"]'
          RENOVATE_AUTODISCOVER: 'true'
          RENOVATE_AUTODISCOVER_FILTER: '^Nooshu/FractalAI$'
          RENOVATE_GIT_AUTHOR: 'Matt Hobbs <matt@nooshu.com>'

