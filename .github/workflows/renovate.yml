name: Renovate

on:
  schedule:
    - cron: '15 2 * * 1' # Mondays at 02:15 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  security-events: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.10
        with:
          token: ${{ secrets.RENOVATE }}
        env:
          LOG_LEVEL: debug

